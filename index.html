<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c1c1e">
<title>음성 투두 &amp; 캘린더</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#1c1c1e;--bg1:#2c2c2e;--bg2:#3a3a3c;--bg3:#48484a;
  --t0:#fff;--t1:rgba(235,235,245,.8);--t2:rgba(235,235,245,.6);
  --acc:#0a84ff;--grn:#30d158;--red:#ff453a;--org:#ff9f0a;--pur:#bf5af2;
  --bdr:#38383a;--shadow:0 4px 24px rgba(0,0,0,.4);--r:12px;
  --sidebar:340px;
}
html{height:100%;height:-webkit-fill-available}
body{height:100vh;height:100dvh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg0);color:var(--t0);overflow:hidden;display:flex;flex-direction:column}
#app{flex:1;display:flex;overflow:hidden;min-height:0}

/* SIDEBAR */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px 20px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.sidebar-header h1{font-size:19px;font-weight:700;flex:1}
.hdr-btn{background:none;border:none;color:var(--t1);font-size:20px;cursor:pointer;padding:5px;border-radius:8px;transition:.15s;line-height:1;-webkit-tap-highlight-color:transparent}
.hdr-btn:hover{background:var(--bg2)}

/* VOICE */
.voice-section{padding:16px 20px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.mic-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.mic-ring{position:absolute;width:80px;height:80px;border-radius:50%;border:2px solid var(--acc);opacity:0;pointer-events:none}
.mic-btn{width:66px;height:66px;border-radius:50%;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;z-index:1;transition:.2s;box-shadow:0 4px 20px rgba(10,132,255,.4);-webkit-tap-highlight-color:transparent}
.mic-btn.recording{background:var(--red);box-shadow:0 4px 20px rgba(255,69,58,.5)}
.mic-btn.recording~.mic-ring{animation:pulse 1.2s ease-out infinite}
@keyframes pulse{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.8)}}
.voice-status{font-size:13px;color:var(--t2);text-align:center}
.transcript-preview{width:100%;background:var(--bg2);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--t1);display:none;word-break:break-word;line-height:1.5}
.transcript-preview.visible{display:block}

/* TEXT INPUT */
.text-input-row{display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.text-input-row input{flex:1;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:9px 13px;color:var(--t0);font-size:14px;outline:none;transition:.2s;-webkit-appearance:none}
.text-input-row input:focus{border-color:var(--acc)}
.text-input-row input::placeholder{color:var(--t2)}
.add-btn{background:var(--acc);border:none;border-radius:10px;padding:9px 15px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* SYNC BAR */
.sync-bar{padding:7px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2);flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--bg3);flex-shrink:0;transition:.3s}
.sync-dot.ok{background:var(--grn)}
.sync-dot.err{background:var(--red)}
.sync-dot.busy{background:var(--org);animation:blink .8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-bar-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-icon-btn{background:none;border:none;color:var(--acc);font-size:13px;font-weight:600;cursor:pointer;padding:3px 6px;border-radius:6px;-webkit-tap-highlight-color:transparent;white-space:nowrap}

/* FILTERS */
.todo-filters{display:flex;gap:6px;padding:10px 14px 8px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.todo-filters::-webkit-scrollbar{display:none}
.filter-btn{background:var(--bg2);border:none;border-radius:20px;padding:5px 13px;color:var(--t1);font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:var(--acc);color:#fff}

/* TODO LIST */
.todo-list{flex:1;overflow-y:auto;padding:6px 10px 10px;display:flex;flex-direction:column;gap:5px;-webkit-overflow-scrolling:touch}
.todo-list::-webkit-scrollbar{width:4px}
.todo-list::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
.todo-item{background:var(--bg2);border-radius:var(--r);padding:11px 12px;display:flex;align-items:flex-start;gap:9px;border-left:3px solid transparent;transition:.15s}
.todo-item.has-date{border-left-color:var(--acc)}
.todo-item.overdue{border-left-color:var(--red)}
.todo-item.completed{opacity:.45}
.todo-item.completed .todo-title{text-decoration:line-through}
.todo-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent}
.todo-item.completed .todo-check{background:var(--grn);border-color:var(--grn)}
.chk-inner{display:none;width:10px;height:8px}
.todo-item.completed .chk-inner{display:block}
.todo-body{flex:1;min-width:0;cursor:pointer}
.todo-title{font-size:14px;font-weight:500;line-height:1.4;word-break:break-word}
.todo-meta{font-size:12px;color:var(--t2);margin-top:3px}
.todo-meta.urgent{color:var(--red)}
.todo-del{background:none;border:none;color:var(--t2);font-size:15px;cursor:pointer;padding:2px 5px;border-radius:6px;flex-shrink:0;opacity:0;-webkit-tap-highlight-color:transparent}
.todo-item:hover .todo-del,.todo-item:active .todo-del{opacity:1}
.empty-state{text-align:center;color:var(--t2);font-size:14px;padding:30px 0}

/* NOTIF BANNER */
.notif-banner{background:rgba(10,132,255,.12);border:1px solid rgba(10,132,255,.25);border-radius:var(--r);margin:6px 10px;padding:9px 12px;font-size:12px;display:none;align-items:center;gap:8px;flex-shrink:0}
.notif-banner.visible{display:flex}
.notif-banner button{background:var(--acc);border:none;border-radius:7px;padding:5px 11px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* MAIN CALENDAR */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.cal-header{padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr);flex-shrink:0;flex-wrap:wrap}
.cal-nav{display:flex;align-items:center;gap:5px}
.cal-nav button{background:var(--bg2);border:none;border-radius:8px;width:32px;height:32px;color:var(--t0);font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.today-btn{background:var(--bg2);border:none;border-radius:8px;padding:0 12px;height:32px;color:var(--acc);font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cal-title{flex:1;font-size:17px;font-weight:700}
.view-tabs{display:flex;background:var(--bg2);border-radius:9px;padding:3px;gap:2px}
.view-tab{background:none;border:none;padding:5px 13px;border-radius:7px;color:var(--t1);font-size:13px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.view-tab.active{background:var(--bg3);color:var(--t0)}
.cal-add-btn{background:var(--acc);border:none;border-radius:9px;width:32px;height:32px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.cal-body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* MONTHLY */
.month-grid{display:flex;flex-direction:column;height:100%}
.month-dow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--bdr);flex-shrink:0}
.month-dow span{text-align:center;font-size:11px;font-weight:600;color:var(--t2);padding:7px 0}
.month-days{display:grid;grid-template-columns:repeat(7,1fr);flex:1;overflow:hidden}
.month-cell{border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);padding:5px 4px;display:flex;flex-direction:column;gap:2px;overflow:hidden;cursor:pointer;min-height:0}
.month-cell:hover{background:rgba(255,255,255,.04)}
.month-cell.other-month .day-num{color:var(--t2)}
.day-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.month-cell.today .day-num{background:var(--acc);color:#fff}
.month-cell.selected{background:rgba(10,132,255,.1)}
.month-event{font-size:10px;padding:1px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;cursor:pointer;line-height:1.6}
.month-event.completed{opacity:.4;text-decoration:line-through}
.more-events{font-size:10px;color:var(--t2);padding-left:3px}

/* TIME GRID */
.tg-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.allday-row{display:flex;border-bottom:2px solid var(--bdr);flex-shrink:0;min-height:28px;max-height:80px;overflow-y:auto}
.allday-tc{width:52px;min-width:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 6px 0 0;font-size:10px;color:var(--t2)}
.allday-cols{flex:1;display:flex}
.allday-col{flex:1;border-left:1px solid var(--bdr);padding:2px 3px;display:flex;flex-direction:column;gap:2px;min-width:0}
.allday-ev{font-size:11px;padding:2px 5px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;cursor:pointer;line-height:1.5}
.allday-ev.completed{opacity:.4;text-decoration:line-through}
.tg-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.tg-head{position:sticky;top:0;z-index:5;background:var(--bg1)}
.tg-body{display:flex}
.time-col{width:52px;min-width:52px;flex-shrink:0}
.time-label{height:60px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;font-size:10px;color:var(--t2);position:relative;top:-6px}
.day-cols{flex:1;display:flex;min-width:0}
.day-col{flex:1;border-left:1px solid var(--bdr);position:relative;min-width:0}
.hour-slots{position:relative}
.hour-slot{height:60px;border-bottom:1px solid var(--bdr);position:relative;cursor:pointer}
.hour-slot:hover{background:rgba(255,255,255,.02)}
.half-line{position:absolute;top:50%;left:0;right:0;border-top:1px dashed rgba(255,255,255,.08);pointer-events:none}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:10;pointer-events:none}
.now-dot{position:absolute;left:-4px;top:-4px;width:9px;height:9px;border-radius:50%;background:var(--red)}
.cal-event{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 5px;font-size:11px;line-height:1.3;overflow:hidden;cursor:pointer;z-index:3;min-height:18px}
.cal-event:hover{opacity:.85;z-index:4}
.cal-event.completed{opacity:.35;text-decoration:line-through}
.cal-event-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-event-time{opacity:.85;font-size:10px}
.week-hdr{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0}
.week-hdr-tc{width:52px;min-width:52px}
.week-hdr-days{flex:1;display:flex}
.week-hdr-day{flex:1;border-left:1px solid var(--bdr);text-align:center;padding:6px 3px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.week-hdr-day .dow{font-size:10px;color:var(--t2);font-weight:600;text-transform:uppercase}
.week-hdr-day .dnum{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:3px auto 0;font-size:15px;font-weight:600}
.week-hdr-day.today .dnum{background:var(--acc);color:#fff}

/* MOBILE TABS */
.mobile-tabs{display:none;background:var(--bg1);border-top:1px solid var(--bdr);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.mobile-tabs button{flex:1;background:none;border:none;padding:10px 0 8px;color:var(--t2);font-size:10px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;-webkit-tap-highlight-color:transparent}
.mobile-tabs button.active{color:var(--acc)}
.mobile-tabs button svg{width:22px;height:22px;stroke-width:1.8}
.tab-hidden{display:none!important}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg1);border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:20px 20px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:slideUp .28s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:34px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px}
.modal-field{margin-bottom:12px}
.modal-field label{font-size:12px;color:var(--t2);display:block;margin-bottom:5px;font-weight:500}
.modal-field input,.modal-field textarea{width:100%;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:9px 13px;color:var(--t0);font-size:15px;outline:none;font-family:inherit;-webkit-appearance:none;transition:.2s}
.modal-field input:focus,.modal-field textarea:focus{border-color:var(--acc)}
.modal-field textarea{resize:none;height:70px;font-size:13px}
.modal-colors{display:flex;gap:10px;flex-wrap:wrap;padding:2px 0}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:.2s;position:relative;-webkit-tap-highlight-color:transparent}
.color-dot.sel::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid #fff}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.modal-btns button{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent}
.btn-cancel{background:var(--bg2);color:var(--t0)}
.btn-save{background:var(--acc);color:#fff}
.btn-del{background:rgba(255,69,58,.12);color:var(--red);border:1px solid rgba(255,69,58,.25)!important}

/* SYNC MODAL EXTRAS */
.sync-steps{background:var(--bg2);border-radius:var(--r);padding:14px 16px;font-size:13px;line-height:1.9;margin-bottom:12px;color:var(--t1)}
.sync-steps a{color:var(--acc);text-decoration:none}
.sync-steps b{color:var(--t0)}
.google-btn{width:100%;padding:13px;border-radius:12px;background:#fff;color:#3c4043;font-size:15px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px;-webkit-tap-highlight-color:transparent;transition:.15s}
.google-btn:hover{background:#f1f3f4}
.google-btn:active{background:#e8eaed}
.google-btn img{width:20px;height:20px}
.user-card{background:var(--bg2);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.user-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0}
.user-avatar-placeholder{width:40px;height:40px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-email{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.disconnect-btn{width:100%;padding:12px;border-radius:12px;background:rgba(255,69,58,.12);border:1px solid rgba(255,69,58,.25);color:var(--red);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;-webkit-tap-highlight-color:transparent}
.config-toggle{font-size:12px;color:var(--t2);text-align:center;margin-top:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.config-toggle:hover{color:var(--acc)}

/* TOAST */
.toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none;width:90vw;max-width:400px}
.toast{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:11px 18px;font-size:14px;color:var(--t0);box-shadow:var(--shadow);pointer-events:auto;animation:toastIn .25s ease;text-align:center;width:100%}
@keyframes toastIn{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
.toast.out{animation:toastOut .25s ease forwards}
@keyframes toastOut{to{opacity:0;transform:translateY(-14px)}}
.toast.notif{border-left:4px solid var(--org)}

/* LIGHT MODE */
.light{--bg0:#f2f2f7;--bg1:#fff;--bg2:#f2f2f7;--bg3:#e5e5ea;--t0:#000;--t1:rgba(60,60,67,.6);--t2:rgba(60,60,67,.4);--bdr:#d1d1d6;--shadow:0 4px 24px rgba(0,0,0,.1)}
.light .google-btn{box-shadow:0 1px 4px rgba(0,0,0,.15)}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:100%;min-width:unset;border-right:none}
  .mobile-tabs{display:flex}
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>🎙 투두 캘린더</h1>
      <button class="hdr-btn" id="syncBtn" title="동기화">☁️</button>
      <button class="hdr-btn" id="themeBtn" title="테마">☀️</button>
    </div>

    <div class="voice-section">
      <div class="mic-wrap">
        <div class="mic-ring" id="micRing"></div>
        <button class="mic-btn" id="micBtn">🎤</button>
      </div>
      <div class="voice-status" id="voiceStatus">클릭하여 음성 입력</div>
      <div class="transcript-preview" id="transcriptPreview"></div>
    </div>

    <div class="notif-banner" id="notifBanner">
      <span>⏰ 알림 권한을 허용하면 일정 5분 전에 알려드려요</span>
      <button onclick="requestNotifPerm()">허용</button>
    </div>

    <div class="sync-bar">
      <div class="sync-dot" id="syncDot"></div>
      <span class="sync-bar-label" id="syncLabel">동기화 꺼짐 — 설정을 눌러 연결</span>
      <button class="sync-icon-btn" id="syncRefreshBtn" onclick="manualSync()" style="display:none">↻</button>
      <button class="sync-icon-btn" onclick="openSyncModal()">설정</button>
    </div>

    <div class="text-input-row">
      <input type="text" id="textInput" placeholder="할 일 또는 일정 입력 후 Enter" autocomplete="off"/>
      <button class="add-btn" onclick="addFromText()">추가</button>
    </div>

    <div class="todo-filters">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="today">오늘</button>
      <button class="filter-btn" data-filter="upcoming">예정</button>
      <button class="filter-btn" data-filter="timed">시간있음</button>
      <button class="filter-btn" data-filter="done">완료</button>
    </div>

    <div class="todo-list" id="todoList"></div>
  </div>

  <!-- CALENDAR -->
  <div class="main" id="main">
    <div class="cal-header">
      <div class="cal-nav">
        <button onclick="navCal(-1)">‹</button>
        <button class="today-btn" onclick="goToday()">오늘</button>
        <button onclick="navCal(1)">›</button>
      </div>
      <div class="cal-title" id="calTitle"></div>
      <button class="cal-add-btn" onclick="openAddModal()" title="추가">+</button>
      <div class="view-tabs">
        <button class="view-tab active" data-view="month" onclick="setView('month')">월</button>
        <button class="view-tab" data-view="week" onclick="setView('week')">주</button>
        <button class="view-tab" data-view="day" onclick="setView('day')">일</button>
      </div>
    </div>
    <div class="cal-body" id="calBody"></div>
  </div>
</div>

<!-- MOBILE TAB BAR -->
<div class="mobile-tabs">
  <button id="tabTodo" class="active" onclick="switchTab('todo',this)">

<script type="module">
import { initializeApp }                                          from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider,
         onAuthStateChanged, signOut }                           from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, setDoc,
         onSnapshot, serverTimestamp }                           from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// ═══════════════════ CONSTANTS ═══════════════════
const STORAGE_KEY = 'vtodo_v2';
const COLORS = ['#0a84ff','#30d158','#ff9f0a','#ff453a','#bf5af2','#5ac8fa','#ff6b6b','#ffd93d'];
const DOW_KO   = ['일','월','화','수','목','금','토'];
const DOW_FULL = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

// ═══════════════════ STATE ═══════════════════════
let state = {
  todos: [], view: 'month',
  currentDate: new Date(), selectedDate: new Date(),
  filter: 'all', theme: 'dark',
  editingId: null, modalColor: COLORS[0],
  notifScheduled: new Set()
};

// ═══════════════════ LOCAL STORAGE ═══════════════
function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    ...state,
    currentDate: state.currentDate.toISOString(),
    selectedDate: state.selectedDate.toISOString(),
    notifScheduled: []
  }));
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return;
    const s = JSON.parse(raw);
    state.todos        = s.todos        || [];
    state.view         = s.view         || 'month';
    state.currentDate  = s.currentDate  ? new Date(s.currentDate)  : new Date();
    state.selectedDate = s.selectedDate ? new Date(s.selectedDate) : new Date();
    state.filter       = s.filter       || 'all';
    state.theme        = s.theme        || 'dark';
  } catch(e) {}
}

// ═══════════════════ FIREBASE ════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyC60vFHIq3fE6PyaCuoiEBmuXdskAyLgGM",
  authDomain: "voice-todo-c829c.firebaseapp.com",
  projectId: "voice-todo-c829c",
  storageBucket: "voice-todo-c829c.firebasestorage.app",
  messagingSenderId: "856838910507",
  appId: "1:856838910507:web:95773896bca49089f2b06e"
};
const fbApp  = initializeApp(firebaseConfig);
const auth   = getAuth(fbApp);
const db     = getFirestore(fbApp);

let currentUser = null, fbUnsub = null, isPulling = false, pushTimer = null;

onAuthStateChanged(auth, user => {
  currentUser = user;
  updateSyncUI();
  if (user) {
    subscribeFb();
    document.getElementById('syncRefreshBtn').style.display = '';
  } else {
    if (fbUnsub) { fbUnsub(); fbUnsub = null; }
    document.getElementById('syncRefreshBtn').style.display = 'none';
  }
});

async function fbPush() {
  if (!currentUser || isPulling) return;
  setSyncDot('busy');
  try {
    await setDoc(doc(db, 'todos', currentUser.uid), {
      items: state.todos,
      updatedAt: serverTimestamp()
    });
    setSyncDot('ok');
  } catch(e) { setSyncDot('err'); console.warn('fbPush', e); }
}

function debouncedPush() {
  clearTimeout(pushTimer);
  pushTimer = setTimeout(fbPush, 600);
}

function subscribeFb() {
  if (fbUnsub) fbUnsub();
  fbUnsub = onSnapshot(doc(db, 'todos', currentUser.uid), snap => {
    if (!snap.exists()) return;
    const data = snap.data();
    if (!data || !Array.isArray(data.items)) return;
    isPulling = true;
    state.todos = data.items;
    saveLocal(); renderTodoList(); renderCal(); rescheduleAll();
    setSyncDot('ok');
    setTimeout(() => { isPulling = false; }, 300);
  }, err => { setSyncDot('err'); console.warn('fb snapshot', err); });
}

async function signInGoogle() {
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  try {
    await signInWithPopup(auth, provider);
    closeSyncModal();
    showToast('로그인됨 — 동기화 시작 ☁️');
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') showToast('로그인 실패: ' + e.message);
  }
}

async function signOutGoogle() {
  if (fbUnsub) { fbUnsub(); fbUnsub = null; }
  await signOut(auth);
  closeSyncModal();
  showToast('로그아웃됨');
}

function manualSync() {
  if (!currentUser) { openSyncModal(); return; }
  subscribeFb();
  showToast('동기화 중... ☁️');
}

function setSyncDot(s) { document.getElementById('syncDot').className = 'sync-dot' + (s ? ' ' + s : ''); }
function updateSyncUI() {
  const lbl = document.getElementById('syncLabel');
  if (!currentUser) { setSyncDot(''); lbl.textContent = 'Google 로그인 필요 — 설정을 눌러 연결'; }
  else { setSyncDot('ok'); lbl.textContent = currentUser.displayName || currentUser.email; }
  if (document.getElementById('syncOverlay').classList.contains('open')) renderSyncModal();
}

function renderSyncModal() {
  document.getElementById('syncLoggedIn').style.display  = currentUser ? 'block' : 'none';
  document.getElementById('syncLoggedOut').style.display = currentUser ? 'none'  : 'block';
  if (currentUser) {
    document.getElementById('userName').textContent  = currentUser.displayName || '사용자';
    document.getElementById('userEmail').textContent = currentUser.email || '';
    if (currentUser.photoURL) {
      document.getElementById('userAvatar').src = currentUser.photoURL;
      document.getElementById('userAvatar').style.display = 'block';
      document.getElementById('userAvatarPlaceholder').style.display = 'none';
    }
  }
}

function openSyncModal() { renderSyncModal(); document.getElementById('syncOverlay').classList.add('open'); }
function closeSyncModal() { document.getElementById('syncOverlay').classList.remove('open'); }

document.getElementById('syncBtn').addEventListener('click', openSyncModal);
document.addEventListener('visibilitychange', () => { if (!document.hidden && currentUser) subscribeFb(); });

// ═══════════════════ KOREAN PARSER ═══════════════
// 한글 숫자 → 정수 (음성인식이 한글로 출력하는 경우 대응)
const KH = {열두:12,열한:11,열:10,아홉:9,여덟:8,일곱:7,여섯:6,다섯:5,
            넷:4,네:4,셋:3,세:3,둘:2,두:2,하나:1,한:1,
            십이:12,십일:11,십:10,구:9,팔:8,칠:7,육:6,오:5,사:4,삼:3,이:2,일:1};
const pN = s => KH[s] !== undefined ? KH[s] : parseInt(s);
// 숫자 단위 — 한글 긴 것부터 먼저 (순서 중요)
const TU = '(열두|열한|열|아홉|여덟|일곱|여섯|다섯|넷|네|셋|세|둘|두|하나|한|십이|십일|십|구|팔|칠|육|사|삼|이|일|\\d{1,2})';

function parseInput(text) {
  let t = text.trim();
  const now = new Date();
  const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let date = null, hasTime = false, hours = -1, minutes = 0, m;

  // ── 시간 파싱 ──
  // 패턴1: 오전/오후 + 시간 + (분|반)?
  m = t.match(new RegExp('([오전오후]+)\\s*' + TU + '\\s*시\\s*(?:' + TU + '\\s*분|(반))?'));
  if (m) {
    hours = pN(m[2]);
    minutes = m[4] === '반' ? 30 : (m[3] ? pN(m[3]) : 0);
    if (m[1].includes('오후') && hours < 12) hours += 12;
    if (m[1].includes('오전') && hours === 12) hours = 0;
    t = t.replace(m[0], '');
  } else {
    // 패턴2: 시간 + 분 (오전/오후 없음)
    m = t.match(new RegExp(TU + '\\s*시\\s*' + TU + '\\s*분'));
    if (m) { hours = pN(m[1]); minutes = pN(m[2]); t = t.replace(m[0], ''); }
    else {
      // 패턴3: 시반
      m = t.match(new RegExp(TU + '\\s*시반'));
      if (m) { hours = pN(m[1]); minutes = 30; t = t.replace(m[0], ''); }
      else {
        // 패턴4: X시 (단독 — 숫자만, 한글 단독 숫자는 오파싱 방지를 위해 오전/오후 있는 경우만)
        m = t.match(/(\d{1,2})\s*시(?!간|작|내|외|장|청)/);
        if (m) { hours = parseInt(m[1]); minutes = 0; t = t.replace(m[0], ''); }
      }
    }
  }

  // ── 날짜 파싱 ──
  const dayMap = {월:1,화:2,수:3,목:4,금:5,토:6,일:0};
  if      (/오늘/.test(t)) { date=new Date(todayMid); t=t.replace(/오늘(까지|에)?/g,''); }
  else if (/내일/.test(t)) { date=new Date(todayMid); date.setDate(date.getDate()+1); t=t.replace(/내일(까지|에)?/g,''); }
  else if (/모레/.test(t)) { date=new Date(todayMid); date.setDate(date.getDate()+2); t=t.replace(/모레(까지|에)?/g,''); }
  else if (/글피/.test(t)) { date=new Date(todayMid); date.setDate(date.getDate()+3); t=t.replace(/글피(까지|에)?/g,''); }
  else {
    m = t.match(/(다음\s*주\s*)?([월화수목금토일])\s*요일(까지)?/);
    if (m) {
      const tgt=dayMap[m[2]]; date=new Date(todayMid);
      let diff=tgt-date.getDay();
      if (m[1]) diff=diff<=0?diff+14:diff+7; else if(diff<=0) diff+=7;
      date.setDate(date.getDate()+diff); t=t.replace(m[0],'');
    } else {
      m = t.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/);
      if (m) {
        date=new Date(now.getFullYear(),parseInt(m[1])-1,parseInt(m[2]));
        if(date<todayMid) date.setFullYear(date.getFullYear()+1);
        t=t.replace(m[0]+'까지','').replace(m[0]+'에','').replace(m[0],'');
      }
    }
  }

  // ── 시간 적용 ──
  if (hours >= 0) {
    hasTime = true;
    if (!date) {
      date = new Date(todayMid);
      const chk = new Date(todayMid); chk.setHours(hours, minutes, 0, 0);
      if (chk <= now) date.setDate(date.getDate() + 1);
    }
    date.setHours(hours, minutes, 0, 0);
  }

  t = t.replace(/[이가은는을를에서으로까지도]/g,' ').replace(/\s{2,}/g,' ').trim();
  return { title: t || text.trim(), date, hasTime };
}

// ═══════════════════ VOICE ════════════════════════
let recognition=null, isRecording=false, stopTimer=null, fullTranscript='';
function resetStopTimer(){ clearTimeout(stopTimer); stopTimer=setTimeout(()=>{ if(recognition)recognition.stop(); },5000); }
function initVoice() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ document.getElementById('voiceStatus').textContent='음성 인식 미지원'; document.getElementById('micBtn').style.opacity='.4'; document.getElementById('micBtn').style.pointerEvents='none'; return; }
  recognition=new SR(); recognition.lang='ko-KR'; recognition.continuous=true; recognition.interimResults=true;
  recognition.onstart=()=>{ isRecording=true; fullTranscript=''; resetStopTimer(); document.getElementById('micBtn').classList.add('recording'); document.getElementById('micBtn').textContent='⏹'; document.getElementById('voiceStatus').textContent='듣는 중...'; };
  recognition.onresult=(e)=>{ resetStopTimer(); let interim=''; for(let x=e.resultIndex;x<e.results.length;x++){ if(e.results[x].isFinal)fullTranscript+=e.results[x][0].transcript; else interim+=e.results[x][0].transcript; } const p=document.getElementById('transcriptPreview'); p.textContent=fullTranscript+interim; p.classList.add('visible'); };
  recognition.onerror=(e)=>{ clearTimeout(stopTimer); stopRec(); if(e.error==='no-speech'){}else if(e.error==='not-allowed')showToast('마이크 권한이 필요합니다'); else showToast('오류: '+e.error); };
  recognition.onend=()=>{ clearTimeout(stopTimer); stopRec(); if(fullTranscript.trim())processVoice(fullTranscript.trim()); };
}
function stopRec(){ isRecording=false; document.getElementById('micBtn').classList.remove('recording'); document.getElementById('micBtn').textContent='🎤'; document.getElementById('voiceStatus').textContent='클릭하여 음성 입력'; }
document.getElementById('micBtn').addEventListener('click',()=>{ if(!recognition)return; if(isRecording){ clearTimeout(stopTimer); recognition.stop(); } else{ document.getElementById('transcriptPreview').classList.remove('visible'); fullTranscript=''; recognition.start(); } });
function processVoice(text){ const p=document.getElementById('transcriptPreview'); p.textContent=text; const d=parseInput(text); addTodo(d.title,d.date,d.hasTime); setTimeout(()=>{ p.classList.remove('visible'); p.textContent=''; },2500); }

// ═══════════════════ TODO CRUD ════════════════════
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function addTodo(title,date,hasTime,color){
  if(!title)return;
  const todo={ id:genId(), title, completed:false, date:date?date.toISOString():null, hasTime:!!hasTime, color:color||COLORS[0], createdAt:new Date().toISOString() };
  state.todos.unshift(todo);
  saveLocal(); debouncedPush(); renderTodoList(); renderCal();
  if(hasTime&&date) scheduleNotif(todo);
  checkNotifBanner();
  const d=date?new Date(date):null;
  showToast(hasTime?`"${title}" — ${fmtDate(d)} ${fmtTime(d)}`:d?`"${title}" — ${fmtDate(d)}`:`"${title}" 추가됨`);
}
function toggleTodo(id){ const t=state.todos.find(x=>x.id===id); if(t){ t.completed=!t.completed; saveLocal(); debouncedPush(); renderTodoList(); renderCal(); } }
function deleteTodo(id){ state.todos=state.todos.filter(x=>x.id!==id); saveLocal(); debouncedPush(); renderTodoList(); renderCal(); }
function addFromText(){ const i=document.getElementById('textInput'); const v=i.value.trim(); if(!v)return; const p=parseInput(v); addTodo(p.title,p.date,p.hasTime); i.value=''; }
document.getElementById('textInput').addEventListener('keydown',e=>{ if(e.key==='Enter')addFromText(); });

// ═══════════════════ NOTIFICATIONS ═══════════════
function requestNotifPerm(){ Notification.requestPermission().then(p=>{ document.getElementById('notifBanner').classList.remove('visible'); if(p==='granted'){ showToast('알림 활성화됨 🔔'); rescheduleAll(); } }); }
function checkNotifBanner(){ if('Notification' in window&&Notification.permission==='default'&&state.todos.some(t=>t.hasTime&&t.date&&!t.completed)) document.getElementById('notifBanner').classList.add('visible'); }
function scheduleNotif(todo){
  if(!todo.date||!todo.hasTime)return;
  const fireAt=new Date(todo.date).getTime()-5*60*1000, delay=fireAt-Date.now();
  if(delay<0||delay>24*60*60*1000||state.notifScheduled.has(todo.id))return;
  state.notifScheduled.add(todo.id);
  setTimeout(()=>{ const t=state.todos.find(x=>x.id===todo.id); if(t&&!t.completed){ const ts=fmtTime(new Date(t.date)); if(Notification.permission==='granted')new Notification('⏰ 5분 후 일정',{body:`${t.title} — ${ts}`}); if(navigator.vibrate)navigator.vibrate([200,100,200]); showToast(`⏰ 5분 후 — ${t.title} (${ts})`,'notif',7000); } state.notifScheduled.delete(todo.id); },Math.max(delay,100));
}
function rescheduleAll(){ state.notifScheduled.clear(); state.todos.forEach(t=>{ if(!t.completed&&t.hasTime&&t.date)scheduleNotif(t); }); }

// ═══════════════════ HELPERS ═════════════════════
function fmtDate(d){ const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()),td=new Date(d.getFullYear(),d.getMonth(),d.getDate()),diff=Math.round((td-today)/86400000); if(diff===0)return '오늘'; if(diff===1)return '내일'; if(diff===-1)return '어제'; if(diff>1&&diff<7)return DOW_FULL[d.getDay()]; return `${d.getMonth()+1}월 ${d.getDate()}일 (${DOW_KO[d.getDay()]})`; }
function fmtTime(d){ const h=d.getHours(),m=d.getMinutes(),ap=h<12?'오전':'오후',hh=h%12||12; return `${ap} ${hh}:${String(m).padStart(2,'0')}`; }
function isOverdue(t){ return t.date&&!t.completed&&new Date(t.date)<new Date(); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toInputDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function toInputTime(d){ return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function weekStart(d){ const r=new Date(d); r.setDate(d.getDate()-d.getDay()); r.setHours(0,0,0,0); return r; }
function getEventsForDay(date){ return state.todos.filter(t=>t.date&&sameDay(new Date(t.date),date)); }
function getTimedForDay(date){ return getEventsForDay(date).filter(t=>t.hasTime); }
function getAllDayForDay(date){ return getEventsForDay(date).filter(t=>!t.hasTime); }

// ═══════════════════ TODO LIST RENDER ════════════
function renderTodoList(){
  const list=document.getElementById('todoList');
  const now=new Date(),ts=new Date(now.getFullYear(),now.getMonth(),now.getDate()),te=new Date(ts); te.setDate(te.getDate()+1);
  let items=[...state.todos];
  if(state.filter==='today') items=items.filter(t=>t.date&&new Date(t.date)>=ts&&new Date(t.date)<te);
  else if(state.filter==='upcoming') items=items.filter(t=>t.date&&new Date(t.date)>=now&&!t.completed);
  else if(state.filter==='timed') items=items.filter(t=>t.hasTime);
  else if(state.filter==='done') items=items.filter(t=>t.completed);
  if(!items.length){ list.innerHTML='<div class="empty-state">📋 할 일이 없습니다</div>'; return; }
  list.innerHTML=items.map(t=>{ const d=t.date?new Date(t.date):null; const ov=isOverdue(t); const ds=d?fmtDate(d)+(t.hasTime?' '+fmtTime(d):''):''; return `<div class="todo-item${t.completed?' completed':''}${(d||t.hasTime)?' has-date':''}${ov?' overdue':''}" style="border-left-color:${(d||t.hasTime)?t.color:'transparent'}"><div class="todo-check" onclick="event.stopPropagation();toggleTodo('${t.id}')"><svg class="chk-inner" viewBox="0 0 10 8"><polyline points="1,4 3.5,7 9,1" fill="none" stroke="white" stroke-width="1.8"/></svg></div><div class="todo-body" onclick="openEditModal('${t.id}')"><div class="todo-title">${escH(t.title)}</div>${d?`<div class="todo-meta${ov?' urgent':''}">${ov?'🔴 ':'📅 '}${escH(ds)}</div>`:''}</div><button class="todo-del" onclick="event.stopPropagation();deleteTodo('${t.id}')">✕</button></div>`; }).join('');
}
document.querySelectorAll('.filter-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ state.filter=btn.dataset.filter; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); saveLocal(); renderTodoList(); }); });

// ═══════════════════ CALENDAR ════════════════════
function navCal(d){ const dt=new Date(state.currentDate); if(state.view==='month')dt.setMonth(dt.getMonth()+d); else if(state.view==='week')dt.setDate(dt.getDate()+d*7); else dt.setDate(dt.getDate()+d); state.currentDate=dt; saveLocal(); renderCal(); }
function goToday(){ state.currentDate=new Date(); state.selectedDate=new Date(); saveLocal(); renderCal(); }
function setView(v){ state.view=v; document.querySelectorAll('.view-tab').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); saveLocal(); renderCal(); }

function renderCal(){
  updateCalTitle();
  const body=document.getElementById('calBody');
  if(state.view==='month')body.innerHTML=renderMonthHTML();
  else if(state.view==='week')body.innerHTML=renderWeekHTML();
  else body.innerHTML=renderDayHTML(state.currentDate);
  attachCalEvents();
  if(state.view!=='month') scrollToNow();
}
function updateCalTitle(){ const d=state.currentDate,t=document.getElementById('calTitle'); if(state.view==='month')t.textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월`; else if(state.view==='week'){ const ws=weekStart(d),we=new Date(ws); we.setDate(we.getDate()+6); t.textContent=ws.getMonth()===we.getMonth()?`${ws.getFullYear()}년 ${ws.getMonth()+1}월 ${ws.getDate()}–${we.getDate()}일`:`${ws.getMonth()+1}/${ws.getDate()} – ${we.getMonth()+1}/${we.getDate()}`; }else t.textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DOW_FULL[d.getDay()]})`; }

function renderMonthHTML(){
  const d=state.currentDate,today=new Date();
  const first=new Date(d.getFullYear(),d.getMonth(),1),last=new Date(d.getFullYear(),d.getMonth()+1,0);
  const cells=[]; for(let i=first.getDay()-1;i>=0;i--){ const dd=new Date(first);dd.setDate(-i);cells.push({date:dd,other:true}); } for(let i=1;i<=last.getDate();i++)cells.push({date:new Date(d.getFullYear(),d.getMonth(),i),other:false}); while(cells.length%7!==0){ const prev=cells[cells.length-1].date,dd=new Date(prev);dd.setDate(prev.getDate()+1);cells.push({date:dd,other:true}); }
  const rows=Math.ceil(cells.length/7);
  let h=`<div class="month-grid"><div class="month-dow">${['일','월','화','수','목','금','토'].map(n=>`<span>${n}</span>`).join('')}</div><div class="month-days" style="grid-template-rows:repeat(${rows},1fr)">`;
  cells.forEach(cell=>{ const isT=sameDay(cell.date,today),isSel=sameDay(cell.date,state.selectedDate); const evs=getEventsForDay(cell.date),total=evs.length; h+=`<div class="month-cell${cell.other?' other-month':''}${isSel?' selected':''}" data-date="${cell.date.toDateString()}"><div class="day-num" style="${isT?'background:var(--acc);color:#fff;':''}">${cell.date.getDate()}</div>`; evs.slice(0,3).forEach(t=>{ h+=`<div class="month-event${t.completed?' completed':''}" style="background:${t.color}" data-id="${t.id}">${escH(t.title)}</div>`; }); if(total>3)h+=`<div class="more-events">+${total-3}개</div>`; h+=`</div>`; });
  return h+`</div></div>`;
}

function renderWeekHTML(){
  const ws=weekStart(state.currentDate),today=new Date();
  const days=Array.from({length:7},(_,i)=>{ const d=new Date(ws);d.setDate(ws.getDate()+i);return d; });
  let h=`<div class="tg-wrap"><div class="tg-scroll"><div class="tg-head"><div class="week-hdr"><div class="week-hdr-tc"></div><div class="week-hdr-days">`;
  days.forEach(d=>{ h+=`<div class="week-hdr-day${sameDay(d,today)?' today':''}" data-date="${d.toDateString()}"><div class="dow">${DOW_KO[d.getDay()]}</div><div class="dnum">${d.getDate()}</div></div>`; });
  h+=`</div></div><div class="allday-row"><div class="allday-tc">종일</div><div class="allday-cols">`;
  days.forEach(d=>{ h+=`<div class="allday-col">`; getAllDayForDay(d).forEach(t=>{ h+=`<div class="allday-ev${t.completed?' completed':''}" style="background:${t.color}" data-id="${t.id}">${escH(t.title)}</div>`; }); h+=`</div>`; });
  h+=`</div></div></div><div class="tg-body"><div class="time-col">`;
  for(let i=0;i<24;i++)h+=`<div class="time-label">${i===0?'':i+':00'}</div>`;
  h+=`</div><div class="day-cols">`;
  days.forEach(d=>{ h+=`<div class="day-col" data-date="${d.toDateString()}"><div class="hour-slots">`; for(let i=0;i<24;i++)h+=`<div class="hour-slot" data-h="${i}" data-date="${d.toDateString()}"><div class="half-line"></div></div>`; h+=`</div>`; getTimedForDay(d).forEach(t=>{ h+=evBlock(t); }); if(sameDay(d,today))h+=nowLine(); h+=`</div>`; });
  return h+`</div></div></div></div>`;
}

function renderDayHTML(d){
  const today=new Date(),alld=getAllDayForDay(d);
  let h=`<div class="tg-wrap"><div class="tg-scroll">`;
  if(alld.length){ h+=`<div class="tg-head"><div class="allday-row"><div class="allday-tc">종일</div><div class="allday-cols"><div class="allday-col">`; alld.forEach(t=>{ h+=`<div class="allday-ev${t.completed?' completed':''}" style="background:${t.color}" data-id="${t.id}">${escH(t.title)}</div>`; }); h+=`</div></div></div></div>`; }
  h+=`<div class="tg-body"><div class="time-col">`;
  for(let i=0;i<24;i++)h+=`<div class="time-label">${i===0?'':i+':00'}</div>`;
  h+=`</div><div class="day-cols"><div class="day-col" data-date="${d.toDateString()}"><div class="hour-slots">`;
  for(let i=0;i<24;i++)h+=`<div class="hour-slot" data-h="${i}" data-date="${d.toDateString()}"><div class="half-line"></div></div>`;
  h+=`</div>`; getTimedForDay(d).forEach(t=>{ h+=evBlock(t); }); if(sameDay(d,today))h+=nowLine();
  return h+`</div></div></div></div></div>`;
}

function evBlock(t){ const d=new Date(t.date),top=d.getHours()*60+d.getMinutes(); return `<div class="cal-event${t.completed?' completed':''}" style="top:${top}px;height:52px;background:${t.color}" data-id="${t.id}"><div class="cal-event-title">${escH(t.title)}</div><div class="cal-event-time">${fmtTime(d)}</div></div>`; }
function nowLine(){ const now=new Date(),top=now.getHours()*60+now.getMinutes(); return `<div class="now-line" style="top:${top}px"><div class="now-dot"></div></div>`; }
function scrollToNow(){ setTimeout(()=>{ const s=document.querySelector('.tg-scroll'); if(s){ const now=new Date(); s.scrollTop=Math.max(0,now.getHours()*60+now.getMinutes()-120); } },60); }
setInterval(()=>{ document.querySelectorAll('.now-line').forEach(el=>{ const now=new Date(); el.style.top=(now.getHours()*60+now.getMinutes())+'px'; }); },60000);

function attachCalEvents(){
  document.querySelectorAll('.month-cell').forEach(el=>{ el.addEventListener('click',e=>{ if(e.target.closest('[data-id]'))return; state.selectedDate=new Date(el.dataset.date); state.currentDate=new Date(el.dataset.date); setView('day'); }); });
  document.querySelectorAll('.week-hdr-day').forEach(el=>{ el.addEventListener('click',()=>{ state.currentDate=new Date(el.dataset.date); setView('day'); }); });
  document.querySelectorAll('.hour-slot').forEach(el=>{ el.addEventListener('click',e=>{ if(e.target.closest('.cal-event'))return; openAddModal(new Date(el.dataset.date),parseInt(el.dataset.h),0); }); });
  document.querySelectorAll('[data-id]').forEach(el=>{ el.addEventListener('click',e=>{ e.stopPropagation(); openEditModal(el.dataset.id); }); });
}

// ═══════════════════ EVENT MODAL ═════════════════
function openAddModal(date,h,m){ date=date||state.currentDate; state.editingId=null; document.getElementById('modalTitle').textContent='일정 추가'; document.getElementById('mTitle').value=''; document.getElementById('mDate').value=date?toInputDate(date):''; document.getElementById('mTime').value=(h!==undefined)?`${String(h).padStart(2,'0')}:${String(m||0).padStart(2,'0')}`:''; state.modalColor=COLORS[0]; renderModalColors(); document.getElementById('modalBtns').innerHTML=`<button class="btn-cancel" onclick="closeModal()">취소</button><button class="btn-save" onclick="saveModal()">저장</button>`; document.getElementById('modalOverlay').classList.add('open'); setTimeout(()=>document.getElementById('mTitle').focus(),150); }
function openEditModal(id){ const todo=state.todos.find(t=>t.id===id); if(!todo)return; state.editingId=id; document.getElementById('modalTitle').textContent='일정 수정'; document.getElementById('mTitle').value=todo.title; document.getElementById('mDate').value=todo.date?toInputDate(new Date(todo.date)):''; document.getElementById('mTime').value=todo.hasTime&&todo.date?toInputTime(new Date(todo.date)):''; state.modalColor=todo.color||COLORS[0]; renderModalColors(); document.getElementById('modalBtns').innerHTML=`<button class="btn-del" onclick="deleteFromModal()">삭제</button><button class="btn-cancel" onclick="closeModal()">취소</button><button class="btn-save" onclick="saveModal()">저장</button>`; document.getElementById('modalOverlay').classList.add('open'); setTimeout(()=>document.getElementById('mTitle').focus(),150); }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); state.editingId=null; }
function saveModal(){
  const title=document.getElementById('mTitle').value.trim(); if(!title){ document.getElementById('mTitle').focus(); return; }
  const dv=document.getElementById('mDate').value,tv=document.getElementById('mTime').value;
  let date=null,hasTime=false;
  if(dv){ date=new Date(dv+'T00:00:00'); if(tv){ const[hh,mm]=tv.split(':'); date.setHours(parseInt(hh),parseInt(mm),0,0); hasTime=true; } }
  if(state.editingId){ const todo=state.todos.find(t=>t.id===state.editingId); if(todo){ todo.title=title; todo.date=date?date.toISOString():null; todo.hasTime=hasTime; todo.color=state.modalColor; saveLocal(); debouncedPush(); renderTodoList(); renderCal(); if(hasTime)scheduleNotif(todo); } }
  else addTodo(title,date,hasTime,state.modalColor);
  closeModal();
}
function deleteFromModal(){ if(state.editingId)deleteTodo(state.editingId); closeModal(); }
function renderModalColors(){ document.getElementById('modalColors').innerHTML=COLORS.map(c=>`<div class="color-dot${c===state.modalColor?' sel':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join(''); }
function selectColor(c){ state.modalColor=c; renderModalColors(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeSyncModal(); } if(e.key==='Enter'&&document.getElementById('modalOverlay').classList.contains('open')&&document.activeElement.tagName!=='TEXTAREA')saveModal(); });

// ═══════════════════ MOBILE TABS ═════════════════
function switchTab(tab,btn){
  const s=document.getElementById('sidebar'),m=document.getElementById('main');
  if(tab==='todo'){ s.classList.remove('tab-hidden'); m.classList.add('tab-hidden'); }
  else { s.classList.add('tab-hidden'); m.classList.remove('tab-hidden'); renderCal(); setTimeout(scrollToNow,100); }
  document.querySelectorAll('.mobile-tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function initMobile(){ if(window.innerWidth<=768) document.getElementById('main').classList.add('tab-hidden'); }

// ═══════════════════ THEME ════════════════════════
function applyTheme(){ document.body.classList.toggle('light',state.theme==='light'); document.getElementById('themeBtn').textContent=state.theme==='light'?'🌙':'☀️'; }
document.getElementById('themeBtn').addEventListener('click',()=>{ state.theme=state.theme==='dark'?'light':'dark'; saveLocal(); applyTheme(); });

// ═══════════════════ TOAST ════════════════════════
function showToast(msg,cls='',dur=3000){ const wrap=document.getElementById('toastWrap'),el=document.createElement('div'); el.className='toast'+(cls?' '+cls:''); el.textContent=msg; wrap.appendChild(el); setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),280); },dur); }

// ═══════════════════ INIT ════════════════════════
function init(){
  loadLocal(); applyTheme(); initVoice(); initMobile();
  renderTodoList(); renderCal(); rescheduleAll(); checkNotifBanner();
}
window.addEventListener('load', init);

// ── window 노출 (module 내부 함수를 HTML onclick에서 호출하기 위해) ──
Object.assign(window, {
  requestNotifPerm, manualSync,
  openSyncModal, closeSyncModal, signInGoogle, signOutGoogle,
  addFromText, navCal, goToday, setView, switchTab,
  toggleTodo, deleteTodo, openAddModal, openEditModal,
  closeModal, saveModal, deleteFromModal, selectColor
});
</script>
</body>
